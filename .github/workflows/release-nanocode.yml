name: Release NanoCode

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-nanocode
  cancel-in-progress: false

jobs:
  metadata:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read workspace version
        id: version
        shell: bash
        run: |
          version="$(awk '
            /^\[workspace\.package\]$/ { in_section=1; next }
            /^\[/ && $0 != "[workspace.package]" { in_section=0 }
            in_section && $1 == "version" {
              gsub(/"/, "", $3)
              print $3
              exit
            }
          ' Cargo.toml)"

          if [[ -z "$version" ]]; then
            echo "Failed to read version from Cargo.toml" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.label }}
    needs: metadata
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux-x64
          - os: macos-14
            target: aarch64-apple-darwin
            label: macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Build release binary
        shell: bash
        run: |
          cargo build \
            --release \
            -p nanocode \
            --target "${{ matrix.target }}"

      - name: Package release artifact
        shell: bash
        run: |
          version="${{ needs.metadata.outputs.version }}"
          target="${{ matrix.target }}"
          stage_dir="release-stage/nanocode-${version}-${target}"
          mkdir -p "$stage_dir"

          cp "target/${target}/release/nanocode" "$stage_dir/nanocode"
          cp README.md "$stage_dir/README.md"

          tar -C release-stage -czf "nanocode-${version}-${target}.tar.gz" "nanocode-${version}-${target}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: nanocode-${{ matrix.target }}
          path: nanocode-${{ needs.metadata.outputs.version }}-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  release:
    name: Create GitHub release
    needs: [metadata, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.tag }}
          name: NanoCode ${{ needs.metadata.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false
          overwrite_files: true
          files: release-artifacts/**/*.tar.gz
